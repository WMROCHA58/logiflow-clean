<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feedback - LogiFlow</title>

<style>

body{
font-family: Arial, sans-serif;
padding:20px;
max-width:700px;
margin:auto;
font-size:18px;
line-height:1.6;
background:#f9fafb;
}

h1{
font-size:28px;
color:#1e3a8a;
margin-bottom:20px;
}

p{
font-size:18px;
}

textarea{
width:100%;
height:200px;
font-size:18px;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
padding:14px 24px;
margin-top:15px;
font-size:18px;
border-radius:10px;
border:none;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:active{
opacity:0.9;
}

.footer{
margin-top:30px;
font-size:16px;
opacity:0.7;
}

</style>

</head>

<body>

<h1>Enviar Feedback</h1>

<p>Envie sugestões ou relate problemas sobre o LogiFlow.</p>

<textarea placeholder="Digite sua mensagem"></textarea>

<br>

<button onclick="alert('Obrigado pelo feedback!')">
Enviar Feedback
</button>

<p class="footer">LogiFlow PRO ©</p>

</body>

</html>
